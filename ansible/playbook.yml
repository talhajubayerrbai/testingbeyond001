---
- name: Configure and deploy FastAPI application
  hosts: all
  become: true
  vars:
    app_dir: /opt/app
    venv_dir: /opt/app/.venv
    app_user: appuser
    app_port: 8000
    artifact_path: /tmp/app.tar.gz

  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Install system dependencies
      apt:
        name:
          - python3.11
          - python3.11-venv
          - python3.11-dev
          - python3-pip
          - nginx
          - curl
          - build-essential
          - git
        state: present

    - name: Create app user
      user:
        name: "{{ app_user }}"
        system: yes
        shell: /bin/false
        home: "{{ app_dir }}"
        create_home: no

    - name: Create app directory
      file:
        path: "{{ app_dir }}"
        state: directory
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        mode: "0755"

    - name: Copy application archive to server
      copy:
        src: "{{ artifact_path }}"
        dest: /tmp/app_deploy.tar.gz
        mode: "0644"

    - name: Extract application archive
      unarchive:
        src: /tmp/app_deploy.tar.gz
        dest: "{{ app_dir }}"
        remote_src: yes
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        extra_opts: ["--strip-components=0"]

    - name: Set ownership of app directory
      file:
        path: "{{ app_dir }}"
        state: directory
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        recurse: yes

    - name: Create Python virtual environment
      command: python3.11 -m venv {{ venv_dir }}
      args:
        creates: "{{ venv_dir }}/bin/activate"
      become_user: "{{ app_user }}"

    - name: Upgrade pip in venv
      command: "{{ venv_dir }}/bin/pip install --upgrade pip"
      become_user: "{{ app_user }}"

    - name: Install Python dependencies from requirements.txt
      command: "{{ venv_dir }}/bin/pip install -r {{ app_dir }}/requirements.txt"
      args:
        chdir: "{{ app_dir }}"
      become_user: "{{ app_user }}"
      ignore_errors: yes

    - name: Install gunicorn and uvicorn workers
      command: "{{ venv_dir }}/bin/pip install gunicorn uvicorn[standard] fastapi"
      become_user: "{{ app_user }}"

    - name: Write application environment file
      shell: |
        cat > {{ app_dir }}/.env << 'ENVEOF'
        APP_ENV=production
        PORT=8000
        HOST=0.0.0.0
        ENVEOF
        chown {{ app_user }}:{{ app_user }} {{ app_dir }}/.env
        chmod 640 {{ app_dir }}/.env

    - name: Create systemd service unit
      copy:
        dest: /etc/systemd/system/app.service
        content: |
          [Unit]
          Description=FastAPI Application (gunicorn + uvicorn)
          After=network.target
          Wants=network.target

          [Service]
          Type=notify
          User={{ app_user }}
          Group={{ app_user }}
          WorkingDirectory={{ app_dir }}
          EnvironmentFile={{ app_dir }}/.env
          ExecStart={{ venv_dir }}/bin/gunicorn app.main:app \
              -k uvicorn.workers.UvicornWorker \
              -w 4 \
              -b 0.0.0.0:{{ app_port }} \
              --timeout 120 \
              --access-logfile - \
              --error-logfile -
          ExecReload=/bin/kill -s HUP $MAINPID
          Restart=on-failure
          RestartSec=5
          KillMode=mixed
          TimeoutStopSec=30

          [Install]
          WantedBy=multi-user.target
        mode: "0644"

    - name: Configure nginx reverse proxy
      copy:
        dest: /etc/nginx/sites-available/app
        content: |
          server {
              listen 80;
              server_name _;

              access_log /var/log/nginx/app_access.log;
              error_log  /var/log/nginx/app_error.log;

              location / {
                  proxy_pass         http://127.0.0.1:{{ app_port }};
                  proxy_http_version 1.1;
                  proxy_set_header   Upgrade $http_upgrade;
                  proxy_set_header   Connection "upgrade";
                  proxy_set_header   Host $host;
                  proxy_set_header   X-Real-IP $remote_addr;
                  proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
                  proxy_set_header   X-Forwarded-Proto $scheme;
                  proxy_read_timeout 300;
                  proxy_connect_timeout 300;
              }
          }
        mode: "0644"

    - name: Enable nginx site
      file:
        src: /etc/nginx/sites-available/app
        dest: /etc/nginx/sites-enabled/app
        state: link

    - name: Remove default nginx site
      file:
        path: /etc/nginx/sites-enabled/default
        state: absent

    - name: Test nginx configuration
      command: nginx -t
      changed_when: false

    - name: Reload systemd daemon
      systemd:
        daemon_reload: yes

    - name: Enable and start application service
      systemd:
        name: app
        enabled: yes
        state: restarted

    - name: Enable and restart nginx
      systemd:
        name: nginx
        enabled: yes
        state: restarted

    - name: Wait for application to become healthy
      uri:
        url: "http://localhost:{{ app_port }}/health"
        method: GET
        status_code: 200
        timeout: 10
      register: health_result
      retries: 12
      delay: 10
      until: health_result.status == 200