---
- name: Deploy FastAPI application
  hosts: all
  become: true
  gather_facts: true

  vars:
    app_dir: /opt/app
    venv_dir: /opt/app/.venv
    app_user: ubuntu
    app_port: 8000
    gunicorn_workers: 4
    project_name: "{{ project_name | default('app') }}"

  tasks:

    # -------------------------------------------------------------------------
    # System packages
    # -------------------------------------------------------------------------
    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Install system dependencies
      apt:
        name:
          - python3.11
          - python3.11-venv
          - python3.11-dev
          - python3-pip
          - nginx
          - git
          - curl
          - build-essential
        state: present

    # -------------------------------------------------------------------------
    # Application directory and code
    # -------------------------------------------------------------------------
    - name: Create application directory
      file:
        path: "{{ app_dir }}"
        state: directory
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        mode: "0755"

    - name: Copy application code to server
      synchronize:
        src: "{{ playbook_dir }}/../"
        dest: "{{ app_dir }}/"
        recursive: yes
        delete: yes
        rsync_opts:
          - "--exclude=.git"
          - "--exclude=.github"
          - "--exclude=terraform"
          - "--exclude=ansible"
          - "--exclude=__pycache__"
          - "--exclude=*.pyc"
          - "--exclude=.venv"
          - "--exclude=venv"
          - "--exclude=*.egg-info"
        checksum: yes

    - name: Set ownership of application directory
      file:
        path: "{{ app_dir }}"
        state: directory
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        recurse: yes

    # -------------------------------------------------------------------------
    # Python virtual environment and dependencies
    # -------------------------------------------------------------------------
    - name: Create Python virtual environment
      command:
        cmd: python3.11 -m venv "{{ venv_dir }}"
        creates: "{{ venv_dir }}/bin/python"
      become_user: "{{ app_user }}"

    - name: Upgrade pip inside venv
      command:
        cmd: "{{ venv_dir }}/bin/pip install --upgrade pip"
      become_user: "{{ app_user }}"

    - name: Install Python dependencies from requirements.txt
      command:
        cmd: "{{ venv_dir }}/bin/pip install -r {{ app_dir }}/requirements.txt"
      become_user: "{{ app_user }}"
      when: lookup('fileglob', '{{ app_dir }}/requirements.txt') | length > 0
      ignore_errors: true

    - name: Install core Python packages
      command:
        cmd: "{{ venv_dir }}/bin/pip install fastapi uvicorn[standard] gunicorn httpx"
      become_user: "{{ app_user }}"

    # -------------------------------------------------------------------------
    # Render .env file via shell (handles empty/missing values safely)
    # -------------------------------------------------------------------------
    - name: Write application .env file
      shell: |
        cat > {{ app_dir }}/.env <<'ENVEOF'
        APP_ENV=production
        PORT=8000
        HOST=0.0.0.0
        ENVEOF
      args:
        executable: /bin/bash

    - name: Set ownership of .env file
      file:
        path: "{{ app_dir }}/.env"
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        mode: "0640"

    # -------------------------------------------------------------------------
    # Systemd service for gunicorn
    # -------------------------------------------------------------------------
    - name: Create gunicorn systemd service
      copy:
        dest: /etc/systemd/system/app.service
        content: |
          [Unit]
          Description=FastAPI application (gunicorn + uvicorn workers)
          After=network.target

          [Service]
          Type=notify
          User={{ app_user }}
          Group={{ app_user }}
          WorkingDirectory={{ app_dir }}
          EnvironmentFile={{ app_dir }}/.env
          ExecStart={{ venv_dir }}/bin/gunicorn app.main:app \
                      -k uvicorn.workers.UvicornWorker \
                      -w {{ gunicorn_workers }} \
                      -b 0.0.0.0:{{ app_port }} \
                      --timeout 120 \
                      --graceful-timeout 30 \
                      --keep-alive 5 \
                      --access-logfile - \
                      --error-logfile -
          ExecReload=/bin/kill -s HUP $MAINPID
          KillMode=mixed
          TimeoutStopSec=5
          PrivateTmp=true
          Restart=on-failure
          RestartSec=5

          [Install]
          WantedBy=multi-user.target
        owner: root
        group: root
        mode: "0644"

    - name: Reload systemd daemon
      systemd:
        daemon_reload: yes

    - name: Enable and start gunicorn service
      systemd:
        name: app
        state: restarted
        enabled: yes

    # -------------------------------------------------------------------------
    # Nginx reverse proxy
    # -------------------------------------------------------------------------
    - name: Remove default nginx site
      file:
        path: /etc/nginx/sites-enabled/default
        state: absent

    - name: Create nginx site configuration
      copy:
        dest: /etc/nginx/sites-available/app
        content: |
          server {
              listen 80;
              server_name _;

              client_max_body_size 50M;

              location / {
                  proxy_pass         http://127.0.0.1:{{ app_port }};
                  proxy_http_version 1.1;
                  proxy_set_header   Upgrade $http_upgrade;
                  proxy_set_header   Connection "upgrade";
                  proxy_set_header   Host $host;
                  proxy_set_header   X-Real-IP $remote_addr;
                  proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
                  proxy_set_header   X-Forwarded-Proto $scheme;
                  proxy_read_timeout 300s;
                  proxy_connect_timeout 75s;
              }
          }
        owner: root
        group: root
        mode: "0644"

    - name: Enable nginx site
      file:
        src: /etc/nginx/sites-available/app
        dest: /etc/nginx/sites-enabled/app
        state: link

    - name: Test nginx configuration
      command: nginx -t
      changed_when: false

    - name: Enable and restart nginx
      systemd:
        name: nginx
        state: restarted
        enabled: yes

    # -------------------------------------------------------------------------
    # Health check on the server itself
    # -------------------------------------------------------------------------
    - name: Wait for application to become healthy
      uri:
        url: "http://localhost:{{ app_port }}/health"
        method: GET
        status_code: 200
        timeout: 10
      register: health_result
      retries: 12
      delay: 10
      until: health_result.status == 200